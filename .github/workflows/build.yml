name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            arch: x86_64
            label: macOS-x64
          - os: macos-latest
            arch: arm64
            label: macOS-arm64
          - os: ubuntu-latest
            arch: x86_64
            label: Linux-x64
          - os: ubuntu-24.04-arm
            arch: arm64
            label: Linux-arm64
          - os: windows-latest
            arch: x86_64
            label: Windows-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.label }})

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build and Test
        run: mvn -B clean verify
        working-directory: java

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-${{ matrix.label }}
          path: |
            java/app/target/*.jar
          retention-days: 7
